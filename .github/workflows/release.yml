name: Release

on:
  push:
    branches:
      - main
      - dev

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v3
        with:
          node-version: 'lts/*'

      - run: npm ci

      # Configure git auth
      - name: Configure git credentials
        run: |
          git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      # Run semantic-release
      - name: Run Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

      # Set release metadata (date + timestamp)
      - name: Set release metadata
        run: |
          echo "NEXT_PUBLIC_APP_RELEASE_DATE=$(date -u '+%B %d, %Y')" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_APP_RELEASE_TIMESTAMP=$(date -u '+%H:%M:%S')" >> $GITHUB_ENV

      # Build
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_APP_VERSION: ${{ env.NEXT_PUBLIC_APP_VERSION }}
          NEXT_PUBLIC_APP_RELEASE_DATE: ${{ env.NEXT_PUBLIC_APP_RELEASE_DATE }}
          NEXT_PUBLIC_APP_RELEASE_TIMESTAMP: ${{ env.NEXT_PUBLIC_APP_RELEASE_TIMESTAMP }}
